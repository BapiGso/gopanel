name: Update Go Modules

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: go-mod-update
  cancel-in-progress: false

jobs:
  update-go-modules:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Upgrade Go modules
        id: update
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t updates < <(
            go list -mod=readonly -u -m -f '{{if and (not .Main) (not .Replace) .Update}}{{.Path}}@{{.Update.Version}}{{end}}' all | sed '/^$/d'
          )

          if [ "${#updates[@]}" -eq 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          cp go.mod "$tmpdir/go.mod"
          if [ -f go.sum ]; then
            cp go.sum "$tmpdir/go.sum"
          fi

          restore_state() {
            cp "$tmpdir/go.mod" go.mod
            if [ -f "$tmpdir/go.sum" ]; then
              cp "$tmpdir/go.sum" go.sum
            else
              rm -f go.sum
            fi
          }

          save_state() {
            cp go.mod "$tmpdir/go.mod"
            if [ -f go.sum ]; then
              cp go.sum "$tmpdir/go.sum"
            else
              rm -f "$tmpdir/go.sum"
            fi
          }

          successful=()
          skipped=()

          printf 'Found %s candidate module updates:\n' "${#updates[@]}"
          printf ' - %s\n' "${updates[@]}"

          if go get "${updates[@]}" && go mod tidy; then
            successful=("${updates[@]}")
          else
            echo "Batch update failed, retrying one module at a time."
            restore_state

            for update in "${updates[@]}"; do
              echo "::group::Trying $update"
              if go get "$update" && go mod tidy; then
                successful+=("$update")
                save_state
                echo "Updated $update"
              else
                skipped+=("$update")
                restore_state
                echo "Skipped $update"
              fi
              echo "::endgroup::"
            done
          fi

          if [ "${#successful[@]}" -eq 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet -- go.mod go.sum; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_updates=true"
            echo "updates<<EOF"
            printf '%s\n' "${successful[@]}"
            echo "EOF"
            echo "skipped_updates<<EOF"
            if [ "${#skipped[@]}" -gt 0 ]; then
              printf '%s\n' "${skipped[@]}"
            else
              echo "None"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Close previous dependency update PRs
        if: steps.update.outputs.has_updates == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_PR_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchName = 'chore/go-mod-updates';
            const title = 'chore: update Go modules';
            const markerLabel = 'go-mod-update';

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            for (const pr of prs) {
              const hasLabel = pr.labels.some(label => label.name === markerLabel);
              const matchesBranch = pr.head.ref === branchName;
              const matchesTitle = pr.title === title;
              if (!hasLabel && !matchesBranch && !matchesTitle) {
                continue;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: 'closed'
              });
            }

      - name: Create pull request
        if: steps.update.outputs.has_updates == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.ACTIONS_PR_TOKEN || github.token }}
          commit-message: "chore: update Go modules"
          branch: chore/go-mod-updates
          delete-branch: true
          title: "chore: update Go modules"
          body: |
            This PR was created automatically by the daily Go module update workflow.

            Updated modules that applied cleanly:
            ```text
            ${{ steps.update.outputs.updates }}
            ```

            Skipped modules:
            ```text
            ${{ steps.update.outputs.skipped_updates }}
            ```

            If you want this PR to trigger other workflows, set `ACTIONS_PR_TOKEN` to a PAT with repo scope.
          add-paths: |
            go.mod
            go.sum

      - name: Apply PR labels
        if: steps.update.outputs.has_updates == 'true' && steps.create_pr.outputs.pull-request-number != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_PR_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number('${{ steps.create_pr.outputs.pull-request-number }}');
            const labels = [
              {
                name: 'dependencies',
                color: '0366d6',
                description: 'Pull requests that update project dependencies'
              },
              {
                name: 'go-mod-update',
                color: '0e8a16',
                description: 'Automated Go module update pull requests'
              }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: labels.map(label => label.name)
            });
